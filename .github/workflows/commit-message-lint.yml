name: Enforce Conventional Commits

on:
  pull_request:
  push:

jobs:
  commit-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine commit range for pull requests
        if: github.event_name == 'pull_request'
        run: |
          echo "BASE_REF=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_ENV"
          echo "HEAD_REF=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"

      - name: Determine commit range for pushes
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            # Initial branch push: find merge-base with default branch to validate the full
            # introduced range. Falls back to single-commit validation if no common ancestor
            # exists (e.g. an orphan branch or the very first commit in the repo).
            merge_base=$(git merge-base HEAD "origin/${{ github.event.repository.default_branch }}" 2>/dev/null || true)
            if [ -n "$merge_base" ]; then
              echo "BASE_REF=${merge_base}" >> "$GITHUB_ENV"
              echo "HEAD_REF=${{ github.sha }}" >> "$GITHUB_ENV"
            else
              echo "HEAD_ONLY=${{ github.sha }}" >> "$GITHUB_ENV"
            fi
          else
            echo "BASE_REF=${{ github.event.before }}" >> "$GITHUB_ENV"
            echo "HEAD_REF=${{ github.sha }}" >> "$GITHUB_ENV"
          fi

      - name: Validate commit messages
        run: |
          chmod +x .github/scripts/validate_commit_messages.sh
          if [ -n "${HEAD_ONLY:-}" ]; then
            ./.github/scripts/validate_commit_messages.sh "$HEAD_ONLY"
          else
            ./.github/scripts/validate_commit_messages.sh "$BASE_REF" "$HEAD_REF"
          fi
