name: Deploy to GitHub Pages

permissions:
  contents: read
  pages: write
  id-token: write

# Ensure only one deployment runs at a time; cancel any in-progress run when a
# new push supersedes it.
concurrency:
  group: pages
  cancel-in-progress: true

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          mkdir -p site
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'tests' \
            --exclude 'site' \
            ./ site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
